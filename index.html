<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시니와 윱의 사찰 여행기 🏯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --moss:    #4a5c3e;
  --moss-l:  #5d7350;
  --terra:   #b05a2f;
  --terra-l: #c97a4a;
  --gold:    #c4953a;
  --gold-l:  #e4b85a;
  --ink:     #1c1510;
  --ink-s:   #4a3f35;
  --ink-m:   #8c7b6e;
  --paper:   #faf7f2;
  --paper-d: #ede8df;
  --border:  rgba(74,63,53,0.13);
  --shadow:  rgba(28,21,16,0.15);
  --r:       10px;
  --cbar-h:  74px;  /* 비교 바 높이 */
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--paper); color: var(--ink); overflow: hidden; }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: 56px; background: var(--moss);
  display: flex; align-items: center; gap: 14px; padding: 0 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,.28);
}
.logo { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; }
.logo em { color: var(--gold-l); font-style: normal; }
.topbar-sep { width: 1px; height: 20px; background: rgba(255,255,255,.2); flex-shrink: 0; }
.search-wrap { position: relative; flex: 1; max-width: 260px; }
.search-wrap input {
  width: 100%; padding: 7px 12px 7px 32px; border-radius: 100px; border: none;
  background: rgba(255,255,255,.15); color: #fff; font-family: inherit; font-size: 13px;
}
.search-wrap input::placeholder { color: rgba(255,255,255,.5); }
.search-wrap input:focus { outline: none; background: rgba(255,255,255,.25); }
.search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }
.region-pills { display: flex; gap: 5px; flex-wrap: nowrap; overflow-x: auto; }
.region-pills::-webkit-scrollbar { display: none; }
.rpill {
  padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 500;
  border: 1.5px solid rgba(255,255,255,.3); color: rgba(255,255,255,.8);
  background: transparent; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all .15s;
}
.rpill:hover, .rpill.on { background: #fff; color: var(--moss); border-color: #fff; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.cnt-badge { background: rgba(255,255,255,.15); color: rgba(255,255,255,.9); padding: 4px 12px; border-radius: 100px; font-size: 11px; border: 1px solid rgba(255,255,255,.2); white-space: nowrap; }
.cnt-badge strong { color: var(--gold-l); }
.cmp-top-btn {
  display: none; padding: 7px 16px; border-radius: 100px;
  background: var(--terra); color: #fff; border: none; cursor: pointer;
  font-size: 12px; font-weight: 600; font-family: inherit; white-space: nowrap; transition: background .15s;
}
.cmp-top-btn.show { display: block; }
.cmp-top-btn:hover { background: var(--terra-l); }

/* ── MAP ── */
#map { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; z-index: 1; }
.leaflet-container { background: #ddd8cc; }

/* ── MARKER ── */
.mk {
  width: 36px; height: 36px; background: var(--moss);
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  border: 2.5px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.3);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background .2s;
}
.mk:hover, .mk.sel { background: var(--terra); }
.mk-inner { transform: rotate(45deg); font-size: 16px; line-height: 1; }
.leaflet-popup-content-wrapper {
  padding: 0; border-radius: var(--r); overflow: hidden;
  box-shadow: 0 4px 20px var(--shadow); border: 1px solid var(--border); background: var(--paper);
}
.leaflet-popup-tip-container { display: none; }
.pu { min-width: 210px; }
.pu-body { padding: 12px 14px 10px; }
.pu-name { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.pu-sub { font-size: 11px; color: var(--ink-m); margin-bottom: 8px; }
.pu-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.pu-tag { padding: 2px 8px; border-radius: 100px; font-size: 10px; background: var(--paper-d); color: var(--moss); }
.pu-price { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; color: var(--moss); }
.pu-price small { font-size: 10px; color: var(--ink-m); font-weight: 400; }
.pu-btn { display: block; width: 100%; padding: 9px; background: var(--moss); color: #fff; border: none; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; text-align: center; transition: background .15s; }
.pu-btn:hover { background: var(--moss-l); }

/* ── SIDE PANEL ── */
.panel {
  position: fixed; top: 56px; right: 0; bottom: 0; z-index: 800;
  width: 380px; background: var(--paper); border-left: 1px solid var(--border);
  box-shadow: -6px 0 28px var(--shadow); display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1), bottom .3s;
}
.panel.open { transform: translateX(0); }
/* 비교 바 열릴 때 패널 bottom 올리기 */
.panel.cbar-open { bottom: var(--cbar-h); }

.panel-close {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(28,21,16,.08); border: none; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background .15s;
}
.panel-close:hover { background: rgba(28,21,16,.18); }
.p-img { width: 100%; height: 200px; object-fit: cover; flex-shrink: 0; }
.p-scroll { flex: 1; overflow-y: auto; padding: 18px 20px 120px; }
.p-scroll::-webkit-scrollbar { width: 4px; }
.p-scroll::-webkit-scrollbar-thumb { background: var(--ink-m); border-radius: 2px; }
.p-region { display: inline-block; background: var(--moss); color: #fff; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 100px; margin-bottom: 8px; }
.p-name { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
.p-temple { font-size: 12px; color: var(--ink-m); margin-bottom: 6px; }
.p-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 14px; }
.p-stars { color: var(--gold); font-size: 13px; }
.p-rval { font-size: 13px; font-weight: 700; }
.p-rcnt { font-size: 11px; color: var(--ink-m); }
.p-desc { font-size: 13px; color: var(--ink-s); line-height: 1.8; margin-bottom: 18px; }
.sec { font-family: 'Noto Serif KR', serif; font-size: 12px; font-weight: 600; color: var(--ink); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; }
.prog-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
.prog-b { padding: 4px 11px; border-radius: 100px; font-size: 11px; background: var(--paper-d); color: var(--moss); border: 1px solid rgba(74,92,62,.22); font-weight: 500; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 16px; }
.ib { background: #fff; border-radius: var(--r); border: 1px solid var(--border); padding: 9px 12px; }
.ib-l { font-size: 10px; color: var(--ink-m); margin-bottom: 2px; }
.ib-v { font-size: 12px; font-weight: 600; }
.revs { display: flex; flex-direction: column; gap: 8px; }
.rev { background: #fff; border-radius: var(--r); border: 1px solid var(--border); padding: 10px 12px; }
.rev-h { display: flex; justify-content: space-between; margin-bottom: 4px; }
.rev-a { font-size: 12px; font-weight: 600; }
.rev-s { font-size: 11px; color: var(--gold); }
.rev-t { font-size: 12px; color: var(--ink-s); line-height: 1.6; }

/* ── PANEL FOOTER — 항상 보이도록 ── */
.p-footer {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 10px 14px 14px;
  background: #fff;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 16px rgba(0,0,0,.06);
  display: flex; gap: 8px; align-items: center;
}
.p-price-w { flex-shrink: 0; }
.p-price-l { font-size: 9px; color: var(--ink-m); }
.p-price-v { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--moss); white-space: nowrap; }
.p-price-v small { font-size: 9px; font-weight: 400; color: var(--ink-m); }

/* 비교/예약 버튼 — 크고 뚜렷하게 */
.p-cmp {
  padding: 11px 16px; border-radius: var(--r);
  border: 2px solid var(--terra); color: var(--terra);
  background: #fff; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
  transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
.p-cmp:hover, .p-cmp.on { background: var(--terra); color: #fff; }
.p-reserve {
  flex: 1; padding: 11px; border-radius: var(--r); min-width: 0;
  background: var(--moss); color: #fff; border: none; cursor: pointer;
  font-size: 13px; font-weight: 700; font-family: inherit; transition: background .15s;
}
.p-reserve:hover { background: var(--moss-l); }

/* ── COMPARE BAR ── */
.cbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 850;
  height: var(--cbar-h);
  background: #fff; border-top: 2px solid var(--terra);
  box-shadow: 0 -4px 20px var(--shadow);
  padding: 0 20px;
  display: flex; align-items: center;
  transform: translateY(100%); transition: transform .3s;
}
.cbar.open { transform: translateY(0); }
.cbar-inner { max-width: 900px; margin: 0 auto; width: 100%; display: flex; gap: 10px; align-items: center; }
.cbar-slots { display: flex; gap: 8px; flex: 1; }
.cslot {
  flex: 1; border: 2px dashed var(--border); border-radius: var(--r);
  padding: 8px 12px; display: flex; align-items: center; justify-content: center;
  height: 48px; gap: 8px;
}
.cslot.filled { border-style: solid; border-color: var(--moss); background: var(--paper); }
.cslot-name { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cslot-rm { width: 18px; height: 18px; border-radius: 50%; background: var(--terra); color: #fff; border: none; cursor: pointer; font-size: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.cslot-empty { font-size: 11px; color: var(--ink-m); }
.cbar-go { padding: 10px 22px; background: var(--terra); color: #fff; border: none; border-radius: var(--r); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background .15s; }
.cbar-go:hover { background: var(--terra-l); }
.cbar-clr { padding: 10px 14px; border: 1.5px solid var(--border); color: var(--ink-m); border-radius: var(--r); cursor: pointer; background: transparent; font-size: 12px; font-family: inherit; white-space: nowrap; }

/* ── LEGEND ── */
.legend {
  position: fixed; bottom: 20px; left: 16px; z-index: 700;
  background: rgba(250,247,242,.95); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 14px; box-shadow: 0 3px 14px var(--shadow);
  transition: bottom .3s;
}
.legend.cbar-open { bottom: calc(var(--cbar-h) + 12px); }
.legend-t { font-size: 10px; font-weight: 600; color: var(--ink-m); margin-bottom: 6px; letter-spacing: .05em; }
.legend-row { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--ink-s); margin-bottom: 3px; }
.ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

@media (max-width: 600px) {
  .panel { width: 100%; }
  .region-pills { display: none; }
  .cbar-slots { gap: 5px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🏯 <em>시니</em>와 <em>윱</em>의 사찰 여행기</div>
  <div class="topbar-sep"></div>
  <div class="search-wrap"><input id="srch" type="text" placeholder="사찰명 검색..."></div>
  <div class="region-pills" id="rpills"></div>
  <div class="topbar-right">
    <div class="cnt-badge">전국 <strong id="vcnt">30</strong>개 사찰</div>
    <button class="cmp-top-btn" id="cmp-top-btn" onclick="openCmpWindow()">⚖️ 비교 분석 (<span id="cmp-cnt">0</span>)</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND -->
<div class="legend" id="legend">
  <div class="legend-t">마커 안내</div>
  <div class="legend-row"><div class="ldot" style="background:#4a5c3e"></div>템플스테이 사찰</div>
  <div class="legend-row"><div class="ldot" style="background:#b05a2f"></div>선택된 사찰</div>
  <div style="font-size:9px;color:var(--ink-m);margin-top:5px;">마커 클릭 → 상세 정보</div>
</div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <img class="p-img" id="p-img" src="" alt="">
  <div class="p-scroll">
    <span class="p-region" id="p-region"></span>
    <div class="p-name" id="p-name"></div>
    <div class="p-temple" id="p-temple"></div>
    <div class="p-rating" id="p-rating"></div>
    <div class="p-desc" id="p-desc"></div>
    <div class="sec">🌿 프로그램</div>
    <div class="prog-row" id="p-progs"></div>
    <div class="sec">📋 상세 정보</div>
    <div class="info-grid" id="p-info"></div>
    <div class="sec">💬 방문 후기</div>
    <div class="revs" id="p-revs"></div>
  </div>
  <!-- 푸터: 항상 패널 맨 아래에 고정 -->
  <div class="p-footer">
    <div class="p-price-w">
      <div class="p-price-l">1박 2일 · 1인</div>
      <div class="p-price-v" id="p-price">—</div>
    </div>
    <button class="p-cmp" id="p-cmp" onclick="toggleCmp()">＋ 비교</button>
    <button class="p-reserve" onclick="reserveNow()">예약하기 →</button>
  </div>
</div>

<!-- COMPARE BAR -->
<div class="cbar" id="cbar">
  <div class="cbar-inner">
    <div class="cbar-slots" id="cslots"></div>
    <button class="cbar-go" onclick="openCmpWindow()">⚖️ 비교 분석 열기</button>
    <button class="cbar-clr" onclick="clearCmp()">초기화</button>
  </div>
</div>

/* ── MAP ── */
const map = L.map('map', { center:[36.5,127.8], zoom:7, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18, opacity:0.82 }).addTo(map);

const mkrs = {};
let cur = null, cmpList = [], activeReg = '';

function makeIcon(sel=false) {
  return L.divIcon({
    className:'',
    html:`<div class="mk${sel?' sel':''}"><div class="mk-inner">🏯</div></div>`,
    iconSize:[36,36], iconAnchor:[18,36], popupAnchor:[0,-38]
  });
}
function st(r){ return '★'.repeat(Math.floor(r))+(r%1>=0.5?'☆':'')+'☆'.repeat(5-Math.ceil(r)); }

/* ── MARKERS ── */
function renderMkrs(list) {
  Object.values(mkrs).forEach(m=>m.remove());
  Object.keys(mkrs).forEach(k=>delete mkrs[k]);
  document.getElementById('vcnt').textContent = list.length;
  list.forEach(t => {
    const m = L.marker([t.lat,t.lng],{icon:makeIcon()}).addTo(map);
    m.bindPopup(`<div class="pu">
      <div class="pu-body">
        <div class="pu-name">${t.temple} — ${t.name}</div>
        <div class="pu-sub">📍 ${t.region} · 1박 2일</div>
        <div class="pu-tags">${t.programs.slice(0,3).map(p=>`<span class="pu-tag">${p}</span>`).join('')}</div>
        <div class="pu-price">${t.price.toLocaleString()}원 <small>/ 1인</small></div>
      </div>
      <button class="pu-btn" onclick="openPanel(${t.id})">상세 보기 →</button>
    </div>`,{maxWidth:230,minWidth:220});
    m.on('click',()=>openPanel(t.id));
    mkrs[t.id] = m;
  });
}

/* ── PANEL ── */
function openPanel(id) {
  const t = T.find(x=>x.id===id); if(!t) return; cur = t;
  Object.entries(mkrs).forEach(([mid,m])=>m.setIcon(makeIcon(Number(mid)===id)));
  document.getElementById('p-img').src   = t.img;
  document.getElementById('p-region').textContent = t.region;
  document.getElementById('p-name').textContent   = t.name;
  document.getElementById('p-temple').textContent  = `${t.temple} · 1박 2일`;
  document.getElementById('p-desc').textContent   = t.desc;
  document.getElementById('p-rating').innerHTML =
    `<span class="p-stars">${st(t.rating)}</span><span class="p-rval">${t.rating}</span><span class="p-rcnt">(${t.reviews}개 후기)</span>`;
  document.getElementById('p-progs').innerHTML = t.programs.map(p=>`<span class="prog-b">${p}</span>`).join('');
  document.getElementById('p-info').innerHTML = `
    <div class="ib"><div class="ib-l">💰 가격</div><div class="ib-v">${t.price.toLocaleString()}원</div></div>
    <div class="ib"><div class="ib-l">⏱ 기간</div><div class="ib-v">1박 2일</div></div>
    <div class="ib"><div class="ib-l">🛏 숙박</div><div class="ib-v">${t.f.stay?'✅ 포함':'❌ 미포함'}</div></div>
    <div class="ib"><div class="ib-l">🍚 식사</div><div class="ib-v">${t.f.meal?'✅ 포함':'❌ 미포함'}</div></div>
    <div class="ib"><div class="ib-l">📶 와이파이</div><div class="ib-v">${t.f.wifi?'✅ 가능':'❌ 불가'}</div></div>
    <div class="ib"><div class="ib-l">🚗 주차</div><div class="ib-v">${t.f.parking?'✅ 가능':'❌ 불가'}</div></div>`;
  document.getElementById('p-revs').innerHTML = t.revs.map(r=>`
    <div class="rev">
      <div class="rev-h"><span class="rev-a">${r.a}</span><span class="rev-s">${'★'.repeat(r.s)}${'☆'.repeat(5-r.s)}</span></div>
      <div class="rev-t">${r.t}</div>
    </div>`).join('');
  document.getElementById('p-price').innerHTML = `${t.price.toLocaleString()}원 <small>/ 1인</small>`;
  refreshCmpBtn();
  document.getElementById('panel').classList.add('open');
  map.setView([t.lat,t.lng],Math.max(map.getZoom(),10),{animate:true});
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  Object.values(mkrs).forEach(m=>m.setIcon(makeIcon(false)));
  cur = null;
}
function reserveNow() { if(cur) window.open(cur.link,'_blank'); }
function refreshCmpBtn() {
  if(!cur) return;
  const inList = cmpList.includes(cur.id);
  const btn = document.getElementById('p-cmp');
  btn.textContent = inList ? '✓ 비교중' : '＋ 비교';
  btn.className = 'p-cmp' + (inList?' on':'');
}

/* ── COMPARE ── */
function toggleCmp() {
  if(!cur) return;
  if(cmpList.includes(cur.id)) { cmpList = cmpList.filter(x=>x!==cur.id); }
  else {
    if(cmpList.length>=3){ alert('최대 3개까지 비교할 수 있습니다.'); return; }
    cmpList.push(cur.id);
  }
  refreshCmpBtn(); updateCbar();
}
function updateCbar() {
  const bar = document.getElementById('cbar');
  const panel = document.getElementById('panel');
  const legend = document.getElementById('legend');
  const topBtn = document.getElementById('cmp-top-btn');
  document.getElementById('cmp-cnt').textContent = cmpList.length;
  const open = cmpList.length > 0;
  if(open){ bar.classList.add('open'); topBtn.classList.add('show'); panel.classList.add('cbar-open'); legend.classList.add('cbar-open'); }
  else { bar.classList.remove('open'); topBtn.classList.remove('show'); panel.classList.remove('cbar-open'); legend.classList.remove('cbar-open'); }

  const slots = [...cmpList]; while(slots.length<3) slots.push(null);
  document.getElementById('cslots').innerHTML = slots.map((id,i)=>{
    if(!id) return `<div class="cslot"><span class="cslot-empty">＋ 사찰 선택 (${i+1}/3)</span></div>`;
    const t = T.find(x=>x.id===id);
    return `<div class="cslot filled"><span class="cslot-name">${t.temple}</span><button class="cslot-rm" onclick="removeCmp(${id})">✕</button></div>`;
  }).join('');
}
function removeCmp(id){ cmpList=cmpList.filter(x=>x!==id); updateCbar(); if(cur&&cur.id===id) refreshCmpBtn(); }
function clearCmp(){ cmpList=[]; updateCbar(); if(cur) refreshCmpBtn(); }

/* ── 비교 분석 → 새 창으로 열기 ── */
function openCmpWindow() {
  if(cmpList.length < 2){ alert('비교하려면 최소 2개를 선택하세요.\n\n① 지도에서 사찰 마커 클릭\n② 오른쪽 패널 아래 [＋ 비교] 버튼 클릭\n③ 2~3개 선택 후 비교 분석 버튼 클릭'); return; }
  const ts = cmpList.map(id=>T.find(t=>t.id===id));
  const bp = Math.min(...ts.map(t=>t.price));
  const br = Math.max(...ts.map(t=>t.rating));
  const bv = Math.max(...ts.map(t=>t.reviews));

  const heads = ts.map(t=>`<th style="background:#4a5c3e;color:#fff;padding:14px 16px;text-align:center;font-size:14px;font-weight:700;">${t.temple}<br><span style="font-weight:400;font-size:11px;">${t.name}</span></th>`).join('');
  const rows = [
    ['지역',     ts.map(t=>t.region)],
    ['가격 (1인)', ts.map(t=>({best:t.price===bp, fmt:t.price.toLocaleString()+'원'}))],
    ['별점',     ts.map(t=>({best:t.rating===br, fmt:`${st(t.rating)} ${t.rating}`}))],
    ['후기 수',  ts.map(t=>({best:t.reviews===bv, fmt:t.reviews+'개'}))],
    ['숙박',     ts.map(t=>t.f.stay?'✅ 포함':'❌ 미포함')],
    ['식사',     ts.map(t=>t.f.meal?'✅ 포함':'❌ 미포함')],
    ['와이파이', ts.map(t=>t.f.wifi?'✅ 가능':'❌ 불가')],
    ['주차',     ts.map(t=>t.f.parking?'✅ 가능':'❌ 불가')],
    ['프로그램', ts.map(t=>t.programs.map(p=>`<span style="display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;background:#ede8df;color:#4a5c3e;border:1px solid rgba(74,92,62,.2);margin:2px;">${p}</span>`).join(''))],
  ];
  const tbody = rows.map(([lbl,vals])=>{
    const tds = vals.map(v=>{
      if(typeof v==='object'&&'best' in v)
        return `<td style="padding:12px 16px;border-bottom:1px solid #e8e2d8;color:${v.best?'#4a5c3e':'#4a3f35'};font-weight:${v.best?'700':'400'};font-size:13px;">${v.best?'🏆 ':''} ${v.fmt}</td>`;
      return `<td style="padding:12px 16px;border-bottom:1px solid #e8e2d8;font-size:13px;color:#4a3f35;">${v}</td>`;
    }).join('');
    return `<tr><th style="background:#ede8df;padding:12px 16px;font-size:12px;font-weight:600;text-align:left;border-bottom:1px solid #e8e2d8;white-space:nowrap;">${lbl}</th>${tds}</tr>`;
  }).join('');

  const imgs = ts.map(t=>`
    <div style="flex:1;min-width:0;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e8e2d8;box-shadow:0 2px 12px rgba(28,21,16,.1);">

      <div style="padding:12px 14px;">
        <div style="font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;margin-bottom:3px;">${t.temple}</div>
        <div style="font-size:11px;color:#8c7b6e;margin-bottom:8px;">${t.region} · ${t.name}</div>
        <div style="color:#c4953a;font-size:13px;margin-bottom:10px;">${st(t.rating)} ${t.rating} (${t.reviews}개)</div>
        <a href="${t.link}" target="_blank" style="display:block;text-align:center;padding:9px;background:#4a5c3e;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">예약하기 →</a>
      </div>
    </div>`).join('');

  const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>사찰 비교 분석 🏯</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

  .body{max-width:900px;margin:0 auto;padding:32px 24px 60px;}
  h2{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;margin-bottom:16px;color:#1c1510;}
  .cards{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
  .table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 2px 16px rgba(28,21,16,.1);}
  table{width:100%;border-collapse:collapse;background:#fff;}
  .note{font-size:11px;color:#8c7b6e;margin-top:12px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:#8c7b6e;border-radius:3px;}

    <tbody>${tbody}</tbody></table>

  <p class="note">💡 🏆 표시는 해당 항목에서 가장 좋은 값입니다.</p>
</div>
</body></html>`;

  const w = window.open('', '_blank', 'width=960,height=800,scrollbars=yes');
  w.document.write(html);
  w.document.close();
}

/* ── FILTERS ── */
const regions = [...new Set(T.map(t=>t.region))].sort();
const rpills = document.getElementById('rpills');
regions.forEach(r => {
  const b = document.createElement('button');
  b.className='rpill'; b.textContent=r;
  b.onclick = () => {
    activeReg = activeReg===r?'':r;
    document.querySelectorAll('.rpill').forEach(p=>p.classList.remove('on'));
    if(activeReg) b.classList.add('on');
    applyFilter();
  };
  rpills.appendChild(b);
});
document.getElementById('srch').addEventListener('input', applyFilter);
function applyFilter() {
  const q = document.getElementById('srch').value.toLowerCase();
  renderMkrs(T.filter(t => {
    if(activeReg && t.region!==activeReg) return false;
    if(q && !t.temple.toLowerCase().includes(q) && !t.name.toLowerCase().includes(q) && !t.region.toLowerCase().includes(q)) return false;
    return true;
  }));
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });
renderMkrs(T);
</script>
</body>
</html>
